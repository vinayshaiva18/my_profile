<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.education{
    padding:80px 10%;
}

.section-title{
    font-size:40px;
    margin-bottom:50px;
}

.education-container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
}

.edu-card{
    width:260px;
    padding:25px;
    border-radius:15px;

    background: linear-gradient(135deg,#4facfe,#43e97b);
    
    backdrop-filter: blur(10px);

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s;
}

.edu-card:hover{
    transform: translateY(-10px);
}

.edu-card h3{
    margin-bottom:10px;
}

.edu-card p{
    margin:5px 0;
}
    </style>
</head>
<body>
<section class="Programming laungaues">

  <h1 class="section-title">Programming Launguages</h1>

  <div class="education-container">

    <div class="edu-card">
      <h2>Known Promramming Languages</h2>
    <p>Python</p>
    <p>HTML</p>
    <p>SQL</p>
    <p>CSS</p>
    <p>Bsic Linuix</p>
    </div>

    <div class="edu-card">
      <h2>Working With Tolls</h2>
    <p>Arduino IDE</p>
    <p>Pycharm</p>
    <p>codeBlocks</p>
    <p>Visual studio</p>
    <p>HeidiSQL</p>
    </div>

  </div>

</section>
</body>
</html>
