<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.education{
    padding:80px 10%;
}

.section-title{
    font-size:40px;
    margin-bottom:50px;
}

.education-container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
}

.edu-card{
    width:260px;
    padding:25px;
    border-radius:15px;

    background: linear-gradient(135deg,#4facfe,#43e97b);
    
    backdrop-filter: blur(10px);

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s;
}

.edu-card:hover{
    transform: translateY(-10px);
}

.edu-card h3{
    margin-bottom:10px;
}

.edu-card p{
    margin:5px 0;
}

    </style>
</head>
<section class="education">

  <h2 class="section-title">About Me</h2>

  <div class="education-container">

    <div class="edu-card">
      <h3>B.Tech - Electronics and communication</h3>
      <p>NIE Institute of Technology , Mysuru</p>
      <p>2020 - Present</p>
      <p>CGPA: 7.10</p>
    </div>

    <div class="edu-card">
      <h3>PUC</h3>
      <p>Sri sapthagiri PU college, Tumkur</p>
      <p>2018 - 2020</p>
      <p>Percentage: 83%</p>
    </div>

    <div class="edu-card">
      <h3>SSLC</h3>
      <p>Adarsha Vidyalaya High School, Gauribidnur</p>
      <p>2017 - 2018</p>
      <p>Percentage: 84%</p>
    </div>

  </div>

</section>
</html>
